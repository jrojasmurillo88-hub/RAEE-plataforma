<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAEE Colombia — Mapa de puntos</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }

    #barra {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: #1a1a2e; color: white;
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    #barra h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }
    #filtro-sistema {
      padding: 5px 10px; border-radius: 6px; border: none;
      background: #2d2d5e; color: white; font-size: 13px; cursor: pointer;
    }
    #contador { font-size: 12px; color: #a0aec0; white-space: nowrap; }

    #mapa { position: fixed; top: 48px; bottom: 0; left: 0; right: 0; }

    .popup-nombre { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .popup-sistema {
      display: inline-block; font-size: 11px; padding: 2px 7px;
      border-radius: 10px; color: white; margin-bottom: 6px;
    }
    .popup-dir { font-size: 12px; color: #555; margin-bottom: 2px; }
    .popup-warn {
      font-size: 11px; color: #c05621; margin-top: 6px;
      background: #fffaf0; padding: 4px 6px; border-radius: 4px;
    }
  </style>
</head>
<body>

<div id="barra">
  <h1>RAEE Colombia</h1>
  <select id="filtro-sistema" onchange="filtrar()">
    <option value="">Todos los sistemas</option>
    <option value="Pilas con el Ambiente">Pilas con el Ambiente</option>
    <option value="EcoCómputo">EcoCómputo</option>
    <option value="Puntos Verdes Lito">Puntos Verdes Lito</option>
    <option value="Lúmina">Lúmina</option>
  </select>
  <span id="contador">Cargando...</span>
</div>

<div id="mapa"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const COLORES = {
    "Pilas con el Ambiente": "#3182ce",
    "EcoCómputo":            "#38a169",
    "Puntos Verdes Lito":    "#d69e2e",
    "Lúmina":                "#9b59b6",
  };

  const mapa = L.map("mapa").setView([4.65, -74.1], 6);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
    maxZoom: 18,
  }).addTo(mapa);

  let todosMarcadores = [];

  function crearIcono(sistema) {
    const color = COLORES[sistema] || "#718096";
    return L.divIcon({
      className: "",
      html: `<div style="
        width:10px; height:10px; border-radius:50%;
        background:${color}; border:2px solid white;
        box-shadow:0 1px 3px rgba(0,0,0,.4);
      "></div>`,
      iconSize: [10, 10],
      iconAnchor: [5, 5],
    });
  }

  function crearPopup(p) {
    const color = COLORES[p.sistema] || "#718096";
    const warn  = p.confianza_coords === 0
      ? `<div class="popup-warn">⚠ Coordenadas no verificadas</div>` : "";
    return `
      <div class="popup-nombre">${p.nombre}</div>
      <span class="popup-sistema" style="background:${color}">${p.sistema}</span>
      <div class="popup-dir">${p.ciudad || ""}</div>
      ${warn}
    `;
  }

  function filtrar() {
    const sistema = document.getElementById("filtro-sistema").value;
    let visibles = 0;
    todosMarcadores.forEach(({ marcador, punto }) => {
      if (!sistema || punto.sistema === sistema) {
        marcador.addTo(mapa);
        visibles++;
      } else {
        marcador.remove();
      }
    });
    document.getElementById("contador").textContent = `${visibles} puntos`;
  }

  async function cargar() {
    try {
      const resp = await fetch("http://localhost:8000/puntos/todos");
      if (!resp.ok) throw new Error(`Error ${resp.status}`);
      const puntos = await resp.json();

      puntos.forEach(p => {
        if (!p.lat || !p.lng) return;
        const marcador = L.marker([p.lat, p.lng], { icon: crearIcono(p.sistema) })
          .bindPopup(crearPopup(p), { maxWidth: 220 });
        todosMarcadores.push({ marcador, punto: p });
        marcador.addTo(mapa);
      });

      document.getElementById("contador").textContent =
        `${todosMarcadores.length} puntos`;

    } catch (e) {
      document.getElementById("contador").textContent = "Error — ¿está corriendo la API?";
      console.error(e);
    }
  }

  cargar();
</script>
</body>
</html>
